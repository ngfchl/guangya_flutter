name: guangya_flutter
description: 光鸭云盘客户端 - 支持文件管理、云下载、分享、TMDB刮削等功能
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: ^3.9.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  dio: ^5.9.2
  crypto: ^3.0.6
  uuid: ^4.4.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  collection: ^1.19.1
  shadcn_ui: ^0.55.0
  lucide_icons_flutter: ^3.0.0
  url_launcher: ^6.3.2
  file_picker: ^12.0.0-beta.5
  install_plugin_v3: ^3.1.3
  pasteboard: ^0.5.0
  cached_network_image: ^3.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  adaptive_platform_ui: ^0.1.106
  liquid_glass_easy: ^2.0.1
  window_manager: ^0.5.1
  logger: ^2.7.0
  easy_refresh: ^3.5.0
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0
  share_plus: ^13.1.0
  permission_handler: ^12.0.1
  image_picker: ^1.2.2
  qr_flutter: ^4.1.0
  desktop_drop: ^0.7.1
  media_kit: ^1.2.4
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.6
  pinyin: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  json_serializable: ^6.13.0
  freezed: ^3.0.6
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/guangya_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/guangya_icon.png
  remove_alpha_ios: true
  min_sdk_android: 21
  windows:
    generate: true
    image_path: assets/branding/guangya_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/guangya_icon.png
