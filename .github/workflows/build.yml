name: Build and Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Build target
        required: true
        default: all
        type: choice
        options: [all, android, ios, macos, windows]
  push:
    tags: ['*']

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.41.9'
  RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
  RELEASE_NAME: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
  RELEASE_DRAFT: ${{ startsWith(github.ref, 'refs/tags/') == false }}

jobs:
  android:
    name: Android arm64 APK
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'android'))
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(awk '/^version:/ { print $2; exit }' pubspec.yaml)
          test -n "$VERSION"
          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=${VERSION%%+*}" >> "$GITHUB_OUTPUT"
          echo "package=${VERSION//+/_}" >> "$GITHUB_OUTPUT"
      - name: Restore Android signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          for name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_PASSWORD KEY_ALIAS; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          test -s android/app/release.jks
          {
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=release.jks\n'
          } > android/key.properties
      - run: flutter pub get
      - name: Build Android APK
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-name="${{ steps.version.outputs.name }}" \
            --build-number="${{ github.run_number }}"
      - name: Package Android APK
        shell: bash
        run: |
          set -euo pipefail
          SOURCE=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          DESTINATION=dist/android/guangya_flutter-${{ steps.version.outputs.package }}-android-arm64.apk
          test -s "$SOURCE"
          mkdir -p dist/android
          cp "$SOURCE" "$DESTINATION"
      - uses: actions/upload-artifact@v7
        with:
          name: android-arm64-apk
          path: dist/android/*.apk
          if-no-files-found: error
      - name: Publish Android package
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ github.token }}
          files: dist/android/*.apk
          fail_on_unmatched_files: true
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.RELEASE_DRAFT }}
          prerelease: false

  ios:
    name: iOS unsigned IPA
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'ios'))
    permissions:
      contents: write
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(awk '/^version:/ { print $2; exit }' pubspec.yaml)
          test -n "$VERSION"
          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=${VERSION%%+*}" >> "$GITHUB_OUTPUT"
          echo "package=${VERSION//+/_}" >> "$GITHUB_OUTPUT"
      - run: flutter pub get
      - name: Build iOS app without code signing
        shell: bash
        run: |
          set -euo pipefail
          flutter build ios \
            --release \
            --no-codesign \
            --build-name="${{ steps.version.outputs.name }}" \
            --build-number="${{ github.run_number }}"
      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP=build/ios/iphoneos/Runner.app
          STAGING="$RUNNER_TEMP/guangya-ipa"
          IPA="$GITHUB_WORKSPACE/dist/ios/guangya_flutter-${{ steps.version.outputs.package }}-ios-arm64-unsigned.ipa"
          test -d "$APP"
          mkdir -p "$STAGING/Payload" dist/ios
          ditto --norsrc --noextattr "$APP" "$STAGING/Payload/Runner.app"
          ditto -c -k --norsrc --noextattr --keepParent "$STAGING/Payload" "$IPA"
          test -s "$IPA"
      - uses: actions/upload-artifact@v7
        with:
          name: ios-unsigned-ipa
          path: dist/ios/*.ipa
          if-no-files-found: error
      - name: Publish iOS package
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ github.token }}
          files: dist/ios/*.ipa
          fail_on_unmatched_files: true
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.RELEASE_DRAFT }}
          prerelease: false

  macos:
    name: macOS universal PKG
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'macos'))
    permissions:
      contents: write
    runs-on: macos-26
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(awk '/^version:/ { print $2; exit }' pubspec.yaml)
          test -n "$VERSION"
          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=${VERSION%%+*}" >> "$GITHUB_OUTPUT"
          echo "package=${VERSION//+/_}" >> "$GITHUB_OUTPUT"
      - run: flutter pub get
      - name: Build macOS app
        shell: bash
        run: |
          set -euo pipefail
          flutter build macos \
            --release \
            --build-name="${{ steps.version.outputs.name }}" \
            --build-number="${{ github.run_number }}"
      - name: Package macOS PKG
        shell: bash
        run: |
          set -euo pipefail
          APP=build/macos/Build/Products/Release/小黄鸭.app
          EXECUTABLE="$APP/Contents/MacOS/小黄鸭"
          PKG=dist/macos/guangya_flutter-${{ steps.version.outputs.package }}-macos-universal.pkg
          STAGING=$(mktemp -d "$RUNNER_TEMP/guangya-pkg.XXXXXX")
          STAGED_APP="$STAGING/小黄鸭.app"
          test -d "$APP"
          test -x "$EXECUTABLE"
          ARCHS=$(lipo -archs "$EXECUTABLE")
          echo "macOS executable architectures: $ARCHS"
          [[ " $ARCHS " == *" arm64 "* && " $ARCHS " == *" x86_64 "* ]]
          codesign --verify --deep --strict --verbose=2 "$APP"
          mkdir -p dist/macos
          ditto --norsrc --noextattr "$APP" "$STAGED_APP"
          codesign --verify --deep --strict --verbose=2 "$STAGED_APP"
          pkgbuild \
            --component "$STAGED_APP" \
            --install-location /Applications \
            --identifier com.ptools.guangyaFlutter.pkg \
            --version "${{ steps.version.outputs.name }}" \
            "$PKG"
          test -s "$PKG"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-universal-pkg
          path: dist/macos/*.pkg
          if-no-files-found: error
      - name: Publish macOS package
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ github.token }}
          files: dist/macos/*.pkg
          fail_on_unmatched_files: true
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.RELEASE_DRAFT }}
          prerelease: false

  windows:
    name: Windows x64 installers
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'windows'))
    permissions:
      contents: write
    runs-on: windows-2022
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $versionLine = Get-Content pubspec.yaml | Where-Object { $_ -match '^version:\s*' } | Select-Object -First 1
          if (-not $versionLine) { throw 'Version not found in pubspec.yaml' }
          $version = ($versionLine -split ':\s*', 2)[1].Trim()
          $versionName = ($version -split '\+', 2)[0]
          $packageVersion = $version -replace '\+', '_'
          "full=$version" >> $env:GITHUB_OUTPUT
          "name=$versionName" >> $env:GITHUB_OUTPUT
          "package=$packageVersion" >> $env:GITHUB_OUTPUT
      - run: flutter pub get
      - name: Build Windows app
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item Env:CMAKE_GENERATOR -ErrorAction SilentlyContinue
          Remove-Item Env:CMAKE_GENERATOR_INSTANCE -ErrorAction SilentlyContinue
          Remove-Item Env:CMAKE_GENERATOR_PLATFORM -ErrorAction SilentlyContinue
          Remove-Item Env:CMAKE_GENERATOR_TOOLSET -ErrorAction SilentlyContinue
          flutter build windows --release --build-name="${{ steps.version.outputs.name }}" --build-number="${{ github.run_number }}"
          if (-not (Test-Path 'build/windows/x64/runner/Release/guangya_flutter.exe')) {
            throw 'Windows executable was not generated'
          }
      - name: Package portable ZIP
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          $zip = 'dist/windows/guangya_flutter-${{ steps.version.outputs.package }}-windows-x64-portable.zip'
          Compress-Archive -Path 'build/windows/x64/runner/Release/*' -DestinationPath $zip -Force
          if (-not (Test-Path $zip)) { throw 'Windows portable ZIP was not generated' }
      - name: Build Windows setup installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup -y --no-progress
          }
          $versionName = '${{ steps.version.outputs.name }}'
          $packageVersion = '${{ steps.version.outputs.package }}'
          $versionInfo = "$versionName.${{ github.run_number }}"
          $setupBaseName = "guangya_flutter-$packageVersion-windows-x64-setup"
          $iss = @"
          [Setup]
          AppId={{7202603F-CE16-45DB-9E60-60CC357E79CF}
          AppName=小黄鸭
          AppVersion=$versionName
          AppVerName=小黄鸭 $versionName
          AppPublisher=PTools
          DefaultDirName={autopf}\Guangya
          DefaultGroupName=小黄鸭
          OutputDir=dist\windows
          OutputBaseFilename=$setupBaseName
          SetupIconFile=windows\runner\resources\app_icon.ico
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          VersionInfoVersion=$versionInfo

          [Languages]
          Name: "chinese"; MessagesFile: "ChineseSimplified.isl";

          [Tasks]
          Name: "desktopicon"; Description: "创建桌面快捷方式"; Flags: unchecked

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\小黄鸭"; Filename: "{app}\guangya_flutter.exe"
          Name: "{autodesktop}\小黄鸭"; Filename: "{app}\guangya_flutter.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\guangya_flutter.exe"; Description: "启动小黄鸭"; Flags: nowait postinstall skipifsilent
          "@
          $utf8Bom = New-Object System.Text.UTF8Encoding($true)
          [System.IO.File]::WriteAllText((Join-Path $PWD 'setup.iss'), $iss, $utf8Bom)
          iscc setup.iss
          $setup = "dist/windows/$setupBaseName.exe"
          if (-not (Test-Path $setup)) { throw 'Windows setup installer was not generated' }
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x64-installers
          path: |
            dist/windows/*.zip
            dist/windows/*.exe
          if-no-files-found: error
      - name: Publish Windows packages
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ github.token }}
          files: |
            dist/windows/*.zip
            dist/windows/*.exe
          fail_on_unmatched_files: true
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.RELEASE_DRAFT }}
          prerelease: false
